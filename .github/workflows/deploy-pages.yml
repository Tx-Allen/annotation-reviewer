name: Deploy to Cloudflare Pages

# 直传(direct upload)部署,绕开 CF 的 git 集成 build 队列。
# 需要在 repo Settings → Secrets → Actions 添加:
#   CLOUDFLARE_API_TOKEN   (权限: Account · Cloudflare Pages · Edit)
#   CLOUDFLARE_ACCOUNT_ID  (e3caf0048f8c90d059ffe4f5664d9340)
# 注意:若该项目已在 CF 后台连了 git 集成,先断开,否则两套部署会打架(见 egcad 经验)。

on:
  push:
    branches: [main]
    paths: ['index.html', '_headers', '.github/workflows/deploy-pages.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Stage static output (只发客户端单文件 + headers,不暴露 Flask 源码)
        run: |
          mkdir -p dist
          cp index.html dist/index.html
          cp _headers dist/_headers
      - name: Deploy (direct upload, no build queue)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy dist --project-name datareviewer --branch main --commit-dirty=true
